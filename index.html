<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>南宫远导航站</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #7CB342 0%, #558B2F 100%);
            --bg-primary: #E3EDCD;
            --bg-secondary: #D1E0B8;
            --bg-card: #E8F3D9;
            --bg-sidebar: rgba(225, 237, 205, 0.95);
            --text-primary: #33691E;
            --text-secondary: #558B2F;
            --text-muted: #7CB342;
            --border-color: #B0C595;
            --shadow-sm: 0 1px 3px rgba(76, 175, 80, 0.1);
            --shadow-md: 0 4px 6px -1px rgba(76, 175, 80, 0.15), 0 2px 4px -1px rgba(76, 175, 80, 0.1);
            --shadow-lg: 0 10px 15px -3px rgba(76, 175, 80, 0.2), 0 4px 6px -2px rgba(76, 175, 80, 0.15);
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 24px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        [data-theme="dark"] {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-card: #1e293b;
            --bg-sidebar: rgba(30, 41, 59, 0.95);
            --text-primary: #f1f5f9;
            --text-secondary: #cbd5e1;
            --text-muted: #94a3b8;
            --border-color: rgba(255, 255, 255, 0.1);
            --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.3);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.4);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.4);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
            transition: var(--transition);
        }

        .bg-animation {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; overflow: hidden; background: var(--bg-primary);
        }
        .bg-animation::before {
            content: ''; position: absolute; top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(124, 179, 66, 0.15) 0%, transparent 50%);
            animation: rotate 30s linear infinite;
        }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        header {
            background: var(--bg-sidebar);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-color);
            padding: 1rem 2rem;
            position: sticky; top: 0; z-index: 100;
            box-shadow: var(--shadow-sm);
        }
        .header-content {
            max-width: 1400px; margin: 0 auto;
            display: flex; align-items: center; justify-content: space-between; gap: 1rem; flex-wrap: wrap;
        }
        .logo {
            font-size: 1.5rem; font-weight: 700;
            background: var(--primary-gradient);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-decoration: none; display: flex; align-items: center; gap: 0.5rem;
        }
        
        .search-container { flex: 1; max-width: 600px; display: flex; gap: 0.5rem; }
        .search-form {
            flex: 1; display: flex; background: var(--bg-card);
            border-radius: var(--radius-xl); padding: 0.25rem;
            border: 2px solid var(--border-color); transition: var(--transition);
        }
        .search-form:focus-within { border-color: var(--text-muted); box-shadow: var(--shadow-md); }
        .search-input {
            flex: 1; padding: 0.75rem 1rem; border: none; background: transparent;
            font-size: 0.95rem; color: var(--text-primary); outline: none;
        }
        .search-input::placeholder { color: var(--text-muted); }
        .search-engine {
            padding: 0.5rem 1rem; border: none; background: transparent;
            color: var(--text-secondary); cursor: pointer; font-size: 0.875rem;
        }
        .search-btn {
            padding: 0.75rem 1.5rem; border: none; border-radius: var(--radius-lg);
            background: var(--primary-gradient); color: white; cursor: pointer;
            font-weight: 600; transition: var(--transition);
        }
        .search-btn:hover { transform: scale(1.05); box-shadow: var(--shadow-md); }
        
        .theme-toggle {
            width: 44px; height: 44px; border: 2px solid var(--border-color);
            background: var(--bg-card); border-radius: var(--radius-md);
            cursor: pointer; font-size: 1.25rem; transition: var(--transition);
        }
        .theme-toggle:hover { border-color: var(--text-muted); transform: scale(1.1); }

        /* 价格显示 */
        .price-bar {
            display: flex; gap: 0.75rem; flex-wrap: wrap;
        }
        .price-item {
            display: flex; align-items: center; gap: 0.3rem;
            font-size: 0.85rem; padding: 0.4rem 0.75rem;
            background: var(--bg-card); border-radius: var(--radius-sm);
            border: 1px solid var(--border-color);
        }
        .price-icon { font-size: 0.9rem; }
        .price-symbol { font-weight: 600; color: var(--text-secondary); }
        .price-value { font-weight: 500; color: var(--text-primary); }

        .content-wrapper {
            max-width: 1400px; margin: 0 auto; padding: 2rem;
            display: grid; grid-template-columns: 240px 1fr; gap: 2rem;
        }
        
        .sidebar { position: relative; }
        .sidebar-card {
            background: var(--bg-card); border-radius: var(--radius-lg);
            padding: 1.5rem; box-shadow: var(--shadow-md);
            position: sticky; top: 100px;
        }
        .sidebar-card h2 { font-size: 1rem; margin-bottom: 1rem; color: var(--text-secondary); }
        .sidebar-card ul { list-style: none; }
        .sidebar-card li { margin-bottom: 0.5rem; }
        .sidebar-card a {
            display: block; padding: 0.5rem 0.75rem; color: var(--text-primary);
            text-decoration: none; border-radius: var(--radius-sm);
            transition: var(--transition); font-size: 0.9rem;
        }
        .sidebar-card a:hover { background: var(--bg-secondary); padding-left: 1rem; }

        main { display: flex; flex-direction: column; gap: 2rem; }
        .category {
            background: var(--bg-card); border-radius: var(--radius-lg);
            padding: 1.5rem; box-shadow: var(--shadow-md);
            opacity: 0; animation: fadeInUp 0.5s ease forwards;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .category:nth-child(1) { animation-delay: 0s; }
        .category:nth-child(2) { animation-delay: 0.15s; }
        .category:nth-child(3) { animation-delay: 0.3s; }
        .category:nth-child(4) { animation-delay: 0.45s; }
        
        .category-header {
            display: flex; align-items: center; gap: 0.75rem;
            margin-bottom: 1.25rem; padding-bottom: 0.75rem;
            border-bottom: 2px solid var(--border-color);
        }
        .category-icon { font-size: 1.5rem; }
        .category-header h2 { font-size: 1.25rem; font-weight: 600; }
        
        .category ul {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 0.75rem;
            list-style: none;
        }
        .category li a {
            display: flex; flex-direction: column; gap: 0.25rem;
            padding: 1rem; background: var(--bg-secondary);
            border-radius: var(--radius-md); text-decoration: none;
            transition: var(--transition); border: 1px solid transparent;
        }
        .category li a:hover {
            transform: translateY(-2px); box-shadow: var(--shadow-md);
            border-color: var(--text-muted);
        }
        .site-title { font-weight: 600; color: var(--text-primary); }
        .site-desc { font-size: 0.85rem; color: var(--text-secondary); }

        footer {
            background: var(--bg-sidebar); border-top: 1px solid var(--border-color);
            padding: 2rem; text-align: center; color: var(--text-secondary);
        }

        .scroll-top {
            position: fixed; bottom: 2rem; right: 2rem;
            width: 50px; height: 50px; border-radius: 50%;
            background: var(--primary-gradient); color: white;
            border: none; cursor: pointer; font-size: 1.5rem;
            box-shadow: var(--shadow-lg); opacity: 0; visibility: hidden;
            transition: var(--transition);
        }
        .scroll-top.visible { opacity: 1; visibility: visible; }
        .scroll-top:hover { transform: scale(1.1); }

        @media (max-width: 900px) {
            .content-wrapper { grid-template-columns: 1fr; }
            .sidebar { display: none; }
        }
        @media (max-width: 600px) {
            header { padding: 1rem; }
            .search-container { order: 3; width: 100%; }
            .content-wrapper { padding: 1rem; }
            .category ul { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="bg-animation"></div>
    
    <header>
        <div class="header-content">
            <a href="#" class="logo">🧭 南宫远区块链导航</a>
            <div class="price-bar" id="priceBar">
                <div class="price-item">
                    <span class="price-icon">₿</span>
                    <span class="price-symbol">BTC</span>
                    <span class="price-value" id="btcPrice">-</span>
                </div>
                <div class="price-item">
                    <span class="price-icon">Ξ</span>
                    <span class="price-symbol">ETH</span>
                    <span class="price-value" id="ethPrice">-</span>
                </div>
            </div>
            <div class="search-container">
                <form class="search-form" id="searchForm">
                    <input type="text" class="search-input" id="searchInput" placeholder="搜索..." autocomplete="off">
                    <select class="search-engine" id="searchEngine">
                        <option value="baidu">百度</option>
                        <option value="google">Google</option>
                        <option value="bing">Bing</option>
                    </select>
                    <button type="submit" class="search-btn">🔍</button>
                </form>
            </div>
            <button class="theme-toggle" id="themeToggle">🌙</button>
        </div>
    </header>

    <div class="content-wrapper">
        <aside class="sidebar">
            <div class="sidebar-card">
                <h2>网站分类</h2>
                <ul>
                    <li><a href="#常用网站">🌐 常用网站</a></li>
                    <li><a href="#AI导航">🤖 AI导航</a></li>
                    <li><a href="#区块链导航">⛓️ 区块链导航</a></li>
                    <li><a href="#工具">🛠️ 工具</a></li>
                </ul>
            </div>
        </aside>
        
        <main id="mainContent"></main>
    </div>
    
    <footer>
        <p>© <span id="copyright-year">2026</span> 南宫远导航站 · 用心打造</p>
    </footer>
    
    <button class="scroll-top" id="scrollTop">↑</button>

            { title: '万能视频下载', url: 'https://greenvideo.cc', desc: '多平台视频下载工具' },

            { title: 'Claude', url: 'https://claude.ai/', desc: 'Anthropic的AI助手' },

            { title: 'Grok', url: 'https://grok.com/', desc: 'X平台AI助手' },
            { title: 'Microsoft Copilot', url: 'https://copilot.microsoft.com/', desc: '微软AI助手' },
            { title: '百度AI', url: 'https://chat.baidu.com/', desc: '百度文心一言' },
            { title: '豆包', url: 'https://www.doubao.com/chat/', desc: '字节跳动AI助手' }
        ],
        '区块链导航': [
            { title: '币安', url: 'https://accounts.binance.com/zh-TW/register?ref=10022763', desc: '全球最大的加密货币交易所' },

            { title: 'OKLink', url: 'https://www.oklink.com/zh-hans', desc: '区块链数据浏览器' },
            { title: 'Coinglass', url: 'https://www.coinglass.com/zh', desc: '加密货币行情与数据' },
            { title: 'CoinMarketCap', url: 'https://coinmarketcap.com/', desc: '加密货币市值排名' },
            { title: 'DeFi Llama', url: 'https://defillama.com/', desc: 'DeFi数据分析平台' },
            { title: 'PANews', url: 'https://www.panewslab.com/zh', desc: '专业的区块链新闻平台' },
            { title: 'BIP-0039', url: 'https://github.com/bitcoin/bips/tree/master/bip-0039', desc: '比特币助记词规范' },
            { title: 'Gate.io', url: 'https://www.gatewebsite.com/zh/signup?ref_type=102&ref=UwdFUQ', desc: '知名加密货币交易所' },
            { title: 'Bitget', url: 'https://www.beeeye.xyz/zh-CN/referral/register?clacCode=MNZREPYS', desc: '知名加密货币交易所' }
        ],
        '工具': [
            { title: '万能视频下载', url: 'https://snapany.com/zh', desc: '多平台视频下载工具' },
            { title: '新闻大全', url: 'https://newsnow.busiyi.world/c/focus', desc: '实时新闻聚合平台' },
            { title: '推特热帖排行', url: 'https://www.attentionvc.ai/article?window=all&lang=zh', desc: '推特热门内容排行榜' },
            { title: 'V2EX', url: 'https://v2ex.com/', desc: '程序员创意社区' },
            { title: '特朗普真相', url: 'https://trumpstruth.org/', desc: '特朗普真相官网' },
            { title: 'GitHub', url: 'https://github.com/coin1234567/', desc: '全球最大代码托管平台' },
            { title: 'Cloudflare', url: 'https://dash.cloudflare.com/', desc: 'CDN与网络安全服务' },
            { title: '激战2数据库', url: 'https://gw2.wishingstarmoye.com/', desc: 'Guild Wars 2数据查询' },
            { title: '激战2贴吧', url: 'https://tieba.baidu.com/f?kw=%BC%A4%D5%BD2', desc: '激战2玩家社区' },
            { title: '阿虚同学的储物间', url: 'https://www.axutongxue.com/', desc: '资源分享网站' },
            { title: '星际2贴吧', url: 'https://tieba.baidu.com/f?ie=utf-8&kw=%E6%98%9F%E9%99%852', desc: 'StarCraft 2玩家社区' }
        ]
    };

    // 获取OKX价格
    async function getPrice() {
        try {
            const [btcRes, ethRes] = await Promise.all([
                fetch('https://www.okx.com/api/v5/market/ticker?instId=BTC-USDT'),
                fetch('https://www.okx.com/api/v5/market/ticker?instId=ETH-USDT')
            ]);
            const btcData = await btcRes.json();
            const ethData = await ethRes.json();
            
            if (btcData.data && btcData.data[0]) {
                const btcPrice = parseFloat(btcData.data[0].last);
                document.getElementById('btcPrice').innerText = '$' + btcPrice.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
            }
            if (ethData.data && ethData.data[0]) {
                const ethPrice = parseFloat(ethData.data[0].last);
                document.getElementById('ethPrice').innerText = '$' + ethPrice.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
            }
        } catch (error) {
            console.log('价格获取失败');
        }
    }
    getPrice();
    setInterval(getPrice, 30000);

    document.addEventListener('DOMContentLoaded', () => {
        // 渲染导航
        const main = document.getElementById('mainContent');
        let html = '';
        Object.keys(navData).forEach(category => {
            const links = navData[category] || [];
            html += `
                <section class="category" id="${category}">
                    <div class="category-header">
                        <span class="category-icon">${CATEGORY_ICONS[category] || '📁'}</span>
                        <h2>${category}</h2>
                    </div>
                    <ul>
                        ${links.map(link => `
                            <li><a href="${link.url}" target="_blank" rel="noopener noreferrer">
                                <span class="site-title">${link.title}</span>
                                <span class="site-desc">${link.desc}</span>
                            </a></li>
                        `).join('')}
                    </ul>
                </section>
            `;
        });
        main.innerHTML = html;

        // 搜索功能
        document.getElementById('searchForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const query = document.getElementById('searchInput').value.trim();
            if (!query) return;
            const engine = document.getElementById('searchEngine').value;
            const urls = {
                baidu: `https://www.baidu.com/s?wd=${encodeURIComponent(query)}`,
                google: `https://www.google.com/search?q=${encodeURIComponent(query)}`,
                bing: `https://www.bing.com/search?q=${encodeURIComponent(query)}`
            };
            window.open(urls[engine], '_blank');
        });
        
        // 主题切换
        const themeToggle = document.getElementById('themeToggle');
        if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
            document.body.setAttribute('data-theme', 'dark');
            themeToggle.textContent = '☀️';
        }
        themeToggle.addEventListener('click', () => {
            const isDark = document.body.getAttribute('data-theme') === 'dark';
            document.body.setAttribute('data-theme', isDark ? '' : 'dark');
            themeToggle.textContent = isDark ? '🌙' : '☀️';
        });
        
        // 侧边栏平滑滚动
        document.querySelectorAll('.sidebar a').forEach(anchor => {
            anchor.addEventListener('click', (e) => {
                e.preventDefault();
                const target = document.querySelector(anchor.getAttribute('href'));
                if (target) {
                    window.scrollTo({ top: target.offsetTop - 80, behavior: 'smooth' });
                }
            });
        });
        
        // 滚动返回顶部
        window.addEventListener('scroll', () => {
            document.getElementById('scrollTop').classList.toggle('visible', window.pageYOffset > 300);
        });
        document.getElementById('scrollTop').addEventListener('click', () => {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });
    });
    </script>
</body>
</html>
