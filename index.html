            --success-gradient: linear-gradient(135deg, #9CCC65 0%, #7CB342 100%);
            --warning-gradient: linear-gradient(135deg, #AED581 0%, #8BC34A 100%);
            --bg-primary: #E3EDCD;
            --bg-secondary: #D1E0B8;
            --bg-card: #E8F3D9;
            --bg-sidebar: rgba(225, 237, 205, 0.95);
            --text-primary: #33691E;
            --text-secondary: #558B2F;
            --text-muted: #7CB342;
            --border-color: #B0C595;
            --shadow-sm: 0 1px 3px rgba(76, 175, 80, 0.1);
            --shadow-md: 0 4px 6px -1px rgba(76, 175, 80, 0.15), 0 2px 4px -1px rgba(76, 175, 80, 0.1);
            --shadow-lg: 0 10px 15px -3px rgba(76, 175, 80, 0.2), 0 4px 6px -2px rgba(76, 175, 80, 0.15);
            --shadow-xl: 0 20px 25px -5px rgba(76, 175, 80, 0.25), 0 10px 10px -5px rgba(76, 175, 80, 0.2);
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 24px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        [data-theme="dark"] {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-card: #1e293b;
            --bg-sidebar: rgba(30, 41, 59, 0.95);
            --text-primary: #f1f5f9;
            --text-secondary: #cbd5e1;
            --text-muted: #94a3b8;
            --border-color: rgba(255, 255, 255, 0.1);
            --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.3);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.4);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.4);
            --shadow-xl: 0 20px 25px -5px rgba(0, 0, 0, 0.4);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
            transition: var(--transition);
        }

        .bg-animation {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; overflow: hidden; background: var(--bg-primary);
        }
        .bg-animation::before {
            content: ''; position: absolute; top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(124, 179, 66, 0.15) 0%, transparent 50%);
            animation: rotate 30s linear infinite;
        }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* Header */
        header {
            background: var(--bg-sidebar);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-color);
            padding: 1rem 2rem;
            position: sticky; top: 0; z-index: 100;
            box-shadow: var(--shadow-sm);
        }
        .header-content {
            max-width: 1400px; margin: 0 auto;
            display: flex; align-items: center; justify-content: space-between; gap: 1rem; flex-wrap: wrap;
        }
        .logo {
            font-size: 1.5rem; font-weight: 700;
            background: var(--primary-gradient);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-decoration: none; display: flex; align-items: center; gap: 0.5rem;
        }
        .logo:hover { text-decoration: none; }
        
        /* Search */
        .search-container {
            flex: 1; max-width: 600px; display: flex; gap: 0.5rem;
        }
        .search-form {
            flex: 1; display: flex; background: var(--bg-card);
            border-radius: var(--radius-xl); padding: 0.25rem;
            border: 2px solid var(--border-color);
            transition: var(--transition);
        }
        .search-form:focus-within { border-color: var(--text-muted); box-shadow: var(--shadow-md); }
        .search-input {
            flex: 1; padding: 0.75rem 1rem; border: none; background: transparent;
            font-size: 0.95rem; color: var(--text-primary); outline: none;
        }
        .search-input::placeholder { color: var(--text-muted); }
        .search-engine {
            padding: 0.5rem 1rem; border: none; background: transparent;
            color: var(--text-secondary); cursor: pointer; font-size: 0.875rem;
        }
        .search-btn {
            padding: 0.75rem 1.5rem; border: none; border-radius: var(--radius-lg);
            background: var(--primary-gradient); color: white; cursor: pointer;
            font-weight: 600; transition: var(--transition);
        }
        .search-btn:hover { transform: scale(1.05); box-shadow: var(--shadow-md); }
        
        /* Theme toggle */
        .theme-toggle {
            width: 44px; height: 44px; border: 2px solid var(--border-color);
            background: var(--bg-card); border-radius: var(--radius-md);
            cursor: pointer; font-size: 1.25rem; transition: var(--transition);
        }
        .theme-toggle:hover { border-color: var(--text-muted); transform: scale(1.1); }

        /* Main */
        .content-wrapper {
            max-width: 1400px; margin: 0 auto; padding: 2rem;
            display: grid; grid-template-columns: 240px 1fr; gap: 2rem;
        }
        
        /* Sidebar */
        .sidebar { position: relative; }
        .sidebar-card {
            background: var(--bg-card); border-radius: var(--radius-lg);
            padding: 1.5rem; box-shadow: var(--shadow-md);
            position: sticky; top: 100px;
        }
        .sidebar-card h2 { font-size: 1rem; margin-bottom: 1rem; color: var(--text-secondary); }
        .sidebar-card ul { list-style: none; }
        .sidebar-card li { margin-bottom: 0.5rem; }
        .sidebar-card a {
            display: block; padding: 0.5rem 0.75rem; color: var(--text-primary);
            text-decoration: none; border-radius: var(--radius-sm);
            transition: var(--transition); font-size: 0.9rem;
        }
        .sidebar-card a:hover { background: var(--bg-secondary); padding-left: 1rem; }

        /* Categories */
        main { display: flex; flex-direction: column; gap: 2rem; }
        .category {
            background: var(--bg-card); border-radius: var(--radius-lg);
            padding: 1.5rem; box-shadow: var(--shadow-md);
            opacity: 0; animation: fadeInUp 0.5s ease forwards;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .category:nth-child(1) { animation-delay: 0s; }
        .category:nth-child(2) { animation-delay: 0.15s; }
        .category:nth-child(3) { animation-delay: 0.3s; }
        .category:nth-child(4) { animation-delay: 0.45s; }
        
        .category-header {
            display: flex; align-items: center; gap: 0.75rem;
            margin-bottom: 1.25rem; padding-bottom: 0.75rem;
            border-bottom: 2px solid var(--border-color);
        }
        .category-icon { font-size: 1.5rem; }
        .category-header h2 { font-size: 1.25rem; font-weight: 600; }
        
        .category ul {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 0.75rem;
            list-style: none;
        }
        .category li a {
            display: flex; flex-direction: column; gap: 0.25rem;
            padding: 1rem; background: var(--bg-secondary);
            border-radius: var(--radius-md); text-decoration: none;
            transition: var(--transition); border: 1px solid transparent;
        }
        .category li a:hover {
            transform: translateY(-2px); box-shadow: var(--shadow-md);
            border-color: var(--text-muted);
        }
        .site-title { font-weight: 600; color: var(--text-primary); }
        .site-desc { font-size: 0.85rem; color: var(--text-secondary); }

        /* Footer */
        footer {
            background: var(--bg-sidebar); border-top: 1px solid var(--border-color);
            padding: 2rem; text-align: center; color: var(--text-secondary);
        }

        /* Scroll to top */
        .scroll-top {
            position: fixed; bottom: 2rem; right: 2rem;
            width: 50px; height: 50px; border-radius: 50%;
            background: var(--primary-gradient); color: white;
            border: none; cursor: pointer; font-size: 1.5rem;
            box-shadow: var(--shadow-lg); opacity: 0; visibility: hidden;
            transition: var(--transition);
        }
        .scroll-top.visible { opacity: 1; visibility: visible; }
        .scroll-top:hover { transform: scale(1.1); }

        /* ===== 后台管理样式 ===== */
        .admin-panel {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 10000; display: none;
        }
        .admin-panel.active { display: flex; align-items: center; justify-content: center; }
        .admin-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
        }
        .admin-container {
            position: relative; width: 95%; max-width: 900px; max-height: 90vh;
            background: var(--bg-card); border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4); overflow: hidden; display: flex; flex-direction: column;
        }
        .admin-header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 16px 24px; background: var(--primary-gradient); color: white;
        }
        .admin-header h2 { font-size: 1.2rem; margin: 0; }
        .admin-close {
            width: 36px; height: 36px; border: none;
            background: rgba(255,255,255,0.2); color: white;
            font-size: 24px; border-radius: 8px; cursor: pointer;
        }
        .admin-content { padding: 20px; overflow-y: auto; flex: 1; }
        
        /* 状态栏 */
        .admin-status {
            padding: 12px 16px; border-radius: 8px; margin-bottom: 15px;
            font-size: 14px; display: flex; align-items: center; gap: 10px;
        }
        .admin-status.success { background: #dcfce7; color: #166534; }
        .admin-status.error { background: #fee2e2; color: #991b1b; }
        .admin-status.warning { background: #fef3c7; color: #92400e; }
        .admin-status.loading { background: #dbeafe; color: #1e40af; }
        
        /* 标签切换 */
        .admin-tabs { display: flex; gap: 8px; margin-bottom: 20px; border-bottom: 2px solid var(--border-color); padding-bottom: 10px; }
        .admin-tab {
            padding: 10px 18px; border: none; background: transparent;
            color: var(--text-secondary); cursor: pointer; border-radius: 8px; font-size: 14px;
        }
        .admin-tab.active { background: var(--primary-gradient); color: white; }
        
        /* 配置区 */
        .config-section {
            background: var(--bg-secondary); padding: 20px; border-radius: 12px; margin-bottom: 20px;
        }
        .config-section h3 { font-size: 1rem; margin-bottom: 15px; color: var(--text-primary); }
        .config-row { display: flex; gap: 10px; margin-bottom: 12px; flex-wrap: wrap; align-items: center; }
        .config-row label { min-width: 80px; font-size: 14px; color: var(--text-secondary); }
        .config-row input {
            flex: 1; min-width: 200px; padding: 10px 14px;
            border: 2px solid var(--border-color); border-radius: 8px;
            font-size: 14px; background: var(--bg-card); color: var(--text-primary);
        }
        .btn {
            padding: 10px 20px; border: none; border-radius: 8px;
            cursor: pointer; font-size: 14px; transition: var(--transition);
        }
        .btn-primary { background: var(--primary-gradient); color: white; }
        .btn-primary:hover { transform: translateY(-1px); }
        .btn-danger { background: #ef4444; color: white; }
        .btn-success { background: #22c55e; color: white; }
        .btn-secondary { background: var(--text-muted); color: white; }
        
        /* 链接编辑 */
        .links-section { background: var(--bg-secondary); padding: 20px; border-radius: 12px; }
        .links-section h3 { font-size: 1rem; margin-bottom: 15px; }
        .category-select {
            padding: 10px 16px; border: 2px solid var(--border-color);
            border-radius: 8px; font-size: 14px; background: var(--bg-card);
            color: var(--text-primary); margin-bottom: 15px; min-width: 200px;
        }
        .links-list { display: flex; flex-direction: column; gap: 10px; max-height: 400px; overflow-y: auto; }
        .link-item {
            display: flex; align-items: center; gap: 15px; padding: 14px;
            background: var(--bg-card); border-radius: 10px;
            cursor: pointer; transition: var(--transition);
        }
        .link-item:hover { background: var(--border-color); }
        .link-item .link-info { flex: 1; min-width: 0; }
        .link-item .link-title { font-weight: 600; color: var(--text-primary); }
        .link-item .link-url { font-size: 12px; color: var(--text-muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .link-item .link-desc { font-size: 13px; color: var(--text-secondary); }
        .link-item .link-actions { display: flex; gap: 8px; }
        .link-item .link-actions button {
            padding: 6px 12px; border: none; border-radius: 6px;
            cursor: pointer; font-size: 12px;
        }
        .link-item .link-actions .edit-btn { background: #3b82f6; color: white; }
        .link-item .link-actions .delete-btn { background: #ef4444; color: white; }
        
        /* 编辑弹窗 */
        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); z-index: 10001; display: none;
            align-items: center; justify-content: center;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: var(--bg-card); padding: 30px; border-radius: 16px;
            width: 90%; max-width: 500px; box-shadow: 0 20px 60px rgba(0,0,0,0.4);
        }
        .modal-content h3 { margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-size: 14px; color: var(--text-secondary); }
        .form-group input {
            width: 100%; padding: 12px 14px; border: 2px solid var(--border-color);
            border-radius: 8px; font-size: 14px; background: var(--bg-secondary);
            color: var(--text-primary);
        }
        .modal-buttons { display: flex; gap: 10px; margin-top: 25px; }
        .modal-buttons button { flex: 1; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; }
        
        /* 设置页面 */
        .settings-section { background: var(--bg-secondary); padding: 20px; border-radius: 12px; margin-bottom: 15px; }
        .settings-section h3 { font-size: 1rem; margin-bottom: 15px; }
        .settings-section p { font-size: 13px; color: var(--text-muted); margin-top: 8px; }

        /* 加载动画 */
        .loading-spinner {
            display: inline-block; width: 20px; height: 20px;
            border: 3px solid rgba(255,255,255,0.3); border-radius: 50%;
            border-top-color: white; animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* 响应式 */
        @media (max-width: 900px) {
            .content-wrapper { grid-template-columns: 1fr; }
            .sidebar { display: none; }
        }
        @media (max-width: 600px) {
            header { padding: 1rem; }
            .search-container { order: 3; width: 100%; }
            .content-wrapper { padding: 1rem; }
            .category ul { grid-template-columns: 1fr; }
        }
    </style>
</head>

            { title: 'CoinDesk', url: 'https://www.coindesk.com/', desc: '全球区块链新闻资讯' },
            { title: 'Gate.io', url: 'https://www.gatewebsite.com/zh/signup?ref_type=102&ref=UwdFUQ', desc: '知名加密货币交易所' },
            { title: 'Bitget', url: 'https://www.beeeye.xyz/zh-CN/referral/register?clacCode=MNZREPYS', desc: '知名加密货币交易所' }
        ],
        '工具': [
            { title: '万能视频下载', url: 'https://snapany.com/zh', desc: '多平台视频下载工具' },
            { title: '新闻大全', url: 'https://newsnow.busiyi.world/c/focus', desc: '实时新闻聚合平台' },
            { title: '推特热帖排行', url: 'https://www.attentionvc.ai/article?window=all&lang=zh', desc: '推特热门内容排行榜' },
            { title: 'V2EX', url: 'https://v2ex.com/', desc: '程序员创意社区' },
            { title: '特朗普真相', url: 'https://trumpstruth.org/', desc: '特朗普真相官网' },
            { title: 'GitHub', url: 'https://github.com/coin1234567/', desc: '全球最大代码托管平台' },
            { title: 'Cloudflare', url: 'https://dash.cloudflare.com/', desc: 'CDN与网络安全服务' },
            { title: '激战2数据库', url: 'https://gw2.wishingstarmoye.com/', desc: 'Guild Wars 2数据查询' },
            { title: '激战2贴吧', url: 'https://tieba.baidu.com/f?kw=%BC%A4%D5%BD2', desc: '激战2玩家社区' },
            { title: '阿虚同学的储物间', url: 'https://www.axutongxue.com/', desc: '资源分享网站' },
            { title: '星际2贴吧', url: 'https://tieba.baidu.com/f?ie=utf-8&kw=%E6%98%9F%E9%99%852', desc: 'StarCraft 2玩家社区' }
        ]
    };

    // 图标映射
    const CATEGORY_ICONS = {
        '常用网站': '🌐', 'AI导航': '🤖', '区块链导航': '⛓️', '工具': '🛠️'
    };

    // 全局变量
    let navData = null;
    let isLoggedIn = false;
    let currentCategory = '常用网站';
    let adminTab = 'edit';
    let keyPressCount = 0;
    let keyPressTimer = null;

    // ========== GitHub Gist API ==========
    const GIST_API = 'https://api.github.com/gists';

    async function loadDataFromGist() {
        if (!CONFIG.GIST_ID) {
            console.log('未配置Gist，使用默认数据');
            navData = JSON.parse(JSON.stringify(DEFAULT_DATA));
            renderNavigation();
            return;
        }

        try {
            // 使用公开的 raw URL，无需 Token
            const rawUrl = `https://gist.githubusercontent.com/coin1234567/${CONFIG.GIST_ID}/raw/nav-data.json`;
            const response = await fetch(rawUrl);
            if (!response.ok) throw new Error('Failed to load');
            navData = await response.json();
        } catch (error) {
            console.log('加载Gist失败，使用默认数据', error);
            navData = JSON.parse(JSON.stringify(DEFAULT_DATA));
        }
        renderNavigation();
    }

    async function saveDataToGist() {
        if (!CONFIG.GIST_ID || !CONFIG.GITHUB_TOKEN) {
            alert('请先在代码中配置 GitHub Token 和 Gist ID！');
            return false;
        }

        try {
            const response = await fetch(`${GIST_API}/${CONFIG.GIST_ID}`, {
                method: 'PATCH',
                headers: {
                    'Authorization': `token ${CONFIG.GITHUB_TOKEN}`,
                    'Accept': 'application/vnd.github.v3+json',
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    files: {
                        'nav-data.json': {
                            content: JSON.stringify(navData, null, 2)
                        }
                    }
                })
            });
            
            if (!response.ok) {
                const errorData = await response.json().catch(() => ({}));
                console.error('保存失败:', response.status, errorData);
                alert(`保存失败 (${response.status}): ${errorData.message || response.statusText}`);
                return false;
            }
            return true;
        } catch (error) {
            console.error('保存失败:', error);
            alert('保存失败：' + error.message);
            return false;
        }
    }

    // ========== 渲染导航 ==========
    function renderNavigation() {
        const main = document.getElementById('mainContent');
        let html = '';

        Object.keys(navData).forEach(category => {
            const links = navData[category] || [];
            html += `
                <section class="category" id="${category}">
                    <div class="category-header">
                        <span class="category-icon">${CATEGORY_ICONS[category] || '📁'}</span>
                        <h2>${category}</h2>
                    </div>
                    <ul>
                        ${links.map(link => `
                            <li><a href="${link.url}" target="_blank" rel="noopener noreferrer">
                                <span class="site-title">${link.title}</span>
                                <span class="site-desc">${link.desc}</span>
                            </a></li>
                        `).join('')}
                    </ul>
                </section>
            `;
        });

        main.innerHTML = html;
    }

    // ========== 后台管理 ==========
    function openAdmin() {
        document.getElementById('adminPanel').classList.add('active');
        if (isLoggedIn) {
            showAdminPanel();
        } else {
            showLoginForm();
        }
    }

    function closeAdmin() {
        document.getElementById('adminPanel').classList.remove('active');
    }

    function showLoginForm() {
        document.getElementById('adminContent').innerHTML = `
            <div style="max-width:400px;margin:50px auto;text-align:center;">
                <h3 style="margin-bottom:20px;">🔐 请输入管理密码</h3>
                <input type="password" id="loginPassword" placeholder="输入密码" 
                    style="width:100%;padding:15px;border:2px solid var(--border-color);border-radius:10px;font-size:16px;margin-bottom:15px;background:var(--bg-secondary);color:var(--text-primary);"
                    onkeypress="if(event.key==='Enter')checkPassword()">
                <button class="btn btn-primary" onclick="checkPassword()" style="width:100%;padding:15px;font-size:16px;">登录</button>
                <p id="loginError" style="color:#ef4444;margin-top:10px;display:none;">密码错误</p>
            </div>
        `;
    }

    function checkPassword() {
        const pass = document.getElementById('loginPassword').value;
        if (pass === CONFIG.ADMIN_PASSWORD) {
            isLoggedIn = true;
            showAdminPanel();
        } else {
            document.getElementById('loginError').style.display = 'block';
        }
    }

    function showAdminPanel() {
        adminTab = 'edit';
        renderAdminContent();
    }

    function renderAdminContent() {
        const content = document.getElementById('adminContent');

        if (adminTab === 'edit') {
            content.innerHTML = `
                <div class="admin-status ${CONFIG.GIST_ID ? 'success' : 'warning'}">
                    ${CONFIG.GIST_ID ? '✅ 已连接云端存储，修改后所有人可见' : '⚠️ 未配置Gist，修改只保存在本地'}
                </div>
                
                <div class="admin-tabs">
                    <button class="admin-tab active" onclick="switchTab('edit')">📝 编辑链接</button>
                    <button class="admin-tab" onclick="switchTab('settings')">⚙️ 设置</button>
                </div>
                
                <div class="links-section">
                    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:15px;flex-wrap:wrap;gap:10px;">
                        <select class="category-select" id="categorySelect" onchange="changeCategory()">
                            ${Object.keys(navData).map(cat => `<option value="${cat}">${cat}</option>`).join('')}
                        </select>
                        <div style="display:flex;gap:10px;">
                            <button class="btn btn-primary" onclick="addLink()">➕ 添加链接</button>
                            <button class="btn btn-success" onclick="saveChanges()">💾 保存全部</button>
                        </div>
                    </div>
                    <div class="links-list" id="linksList"></div>
                </div>
            `;
            document.getElementById('categorySelect').value = currentCategory;
            renderLinksList();
        } else {
            content.innerHTML = `
                <div class="admin-tabs">
                    <button class="admin-tab" onclick="switchTab('edit')">📝 编辑链接</button>
                    <button class="admin-tab active" onclick="switchTab('settings')">⚙️ 设置</button>
                </div>
                
                <div class="settings-section">
                    <h3>📋 配置说明</h3>
                    <p>要实现云端同步（修改后所有人可见），需要：</p>
                    <ol style="margin:10px 0 15px 20px;font-size:13px;line-height:1.8;">
                        <li>登录 GitHub → Settings → Developer settings → Personal access tokens → Generate new token</li>
                        <li>勾选 <strong>gist</strong> 权限</li>
                        <li>创建 Gist: <a href="https://gist.github.com/" target="_blank" style="color:var(--primary);">https://gist.github.com/</a></li>
                        <li>创建名为 <code>nav-data.json</code> 的文件，内容为 <code>{}</code></li>
                        <li>把 Token 和 Gist ID 填到代码顶部的 CONFIG 配置区</li>
                    </ol>
                </div>
                
                <div class="settings-section">
                    <h3>🔑 修改密码</h3>
                    <div class="config-row">
                        <label>新密码:</label>
                        <input type="password" id="newPassword" placeholder="输入新密码">
                        <button class="btn btn-primary" onclick="changePassword()">确认修改</button>
                    </div>
                </div>
                
                <div class="settings-section">
                    <h3>💾 数据管理</h3>
                    <button class="btn btn-secondary" onclick="resetToDefault()">🔄 重置为默认数据</button>
                    <p>⚠️ 重置后需要重新保存才会同步到云端</p>
                </div>
            `;
        }
    }

    function switchTab(tab) {
        adminTab = tab;
        renderAdminContent();
    }

    function changeCategory() {
        currentCategory = document.getElementById('categorySelect').value;
        renderLinksList();
    }

    function renderLinksList() {
        const list = document.getElementById('linksList');
        if (!list) return;
        const links = navData[currentCategory] || [];
        list.innerHTML = links.map((link, index) => `
            <div class="link-item">
                <div class="link-info">
                    <div class="link-title">${link.title}</div>
                    <div class="link-url">${link.url}</div>
                    <div class="link-desc">${link.desc}</div>
                </div>
                <div class="link-actions">
                    <button class="edit-btn" onclick="openEditModal('${currentCategory}', ${index})">编辑</button>
                    <button class="delete-btn" onclick="confirmDelete('${currentCategory}', ${index})">删除</button>
                </div>
            </div>
        `).join('');
    }

    function addLink() {
        navData[currentCategory].push({ title: '新链接', url: 'https://', desc: '描述' });
        renderLinksList();
        const idx = navData[currentCategory].length - 1;
        openEditModal(currentCategory, idx);
    }

    function openEditModal(category, index) {
        const link = navData[category][index];
        document.getElementById('editCategory').value = category;
        document.getElementById('editIndex').value = index;
        document.getElementById('editTitle').value = link.title;
        document.getElementById('editUrl').value = link.url;
        document.getElementById('editDesc').value = link.desc;
        document.getElementById('editModal').classList.add('active');
    }

    function closeEditModal() {
        document.getElementById('editModal').classList.remove('active');
    }

    function saveLink() {
        const category = document.getElementById('editCategory').value;
        const index = parseInt(document.getElementById('editIndex').value);
        navData[category][index] = {
            title: document.getElementById('editTitle').value,
            url: document.getElementById('editUrl').value,
            desc: document.getElementById('editDesc').value
        };
        closeEditModal();
        renderLinksList();
        renderNavigation();
        showToast('已修改，请点击"保存全部"同步到云端');
    }

    function confirmDelete(category, index) {
        if (confirm('确定删除这个链接吗？')) {
            navData[category].splice(index, 1);
            renderLinksList();
            renderNavigation();
            showToast('已删除，请点击"保存全部"同步到云端');
        }
    }

    function deleteLink() {
        const category = document.getElementById('editCategory').value;
        const index = parseInt(document.getElementById('editIndex').value);
        navData[category].splice(index, 1);
        closeEditModal();
        renderLinksList();
        renderNavigation();
        showToast('已删除，请点击"保存全部"同步到云端');
    }

    async function saveChanges() {
        const statusEl = document.querySelector('.admin-status');
        statusEl.className = 'admin-status loading';
        statusEl.innerHTML = '<span class="loading-spinner"></span> 保存中...';

        const success = await saveDataToGist();
        
        if (success) {
            statusEl.className = 'admin-status success';
            statusEl.innerHTML = '✅ 保存成功！所有人刷新页面即可看到更新';
            renderNavigation();
        } else if (!CONFIG.GIST_ID) {
            statusEl.className = 'admin-status warning';
            statusEl.innerHTML = '⚠️ 未配置云端存储，数据仅保存在本地';
        } else {
            statusEl.className = 'admin-status error';
            statusEl.innerHTML = '❌ 保存失败，请检查Token和Gist配置';
        }
    }

    function changePassword() {
        const newPass = document.getElementById('newPassword').value.trim();
        if (!newPass) {
            alert('请输入新密码');
            return;
        }
        if (confirm('修改密码后需要同步到云端才能生效。是否继续？')) {
            CONFIG.ADMIN_PASSWORD = newPass;
            alert('密码已修改为: ' + newPass + '\n请复制新代码部署，密码硬编码在HTML中');
        }
    }

    function resetToDefault() {
        if (confirm('确定重置为默认数据吗？')) {
            navData = JSON.parse(JSON.stringify(DEFAULT_DATA));
            renderNavigation();
            renderLinksList();
            showToast('已重置，请点击"保存全部"同步到云端');
        }
    }

    function showToast(message) {
        const toast = document.createElement('div');
        toast.style.cssText = 'position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#333;color:white;padding:12px 24px;border-radius:8px;z-index:10002;animation:fadeInUp 0.3s ease';
        toast.textContent = message;
        document.body.appendChild(toast);
        setTimeout(() => {
            toast.style.opacity = '0';
            setTimeout(() => toast.remove(), 300);
        }, 3000);
    }

    // ========== 初始化 ==========
    document.addEventListener('DOMContentLoaded', () => {
        document.getElementById('copyright-year').textContent = new Date().getFullYear();
        
        // 加载数据
        loadDataFromGist();
        
        // 搜索功能
        document.getElementById('searchForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const query = document.getElementById('searchInput').value.trim();
            if (!query) return;
            const engine = document.getElementById('searchEngine').value;
            const urls = {
                baidu: `https://www.baidu.com/s?wd=${encodeURIComponent(query)}`,
                google: `https://www.google.com/search?q=${encodeURIComponent(query)}`,
                bing: `https://www.bing.com/search?q=${encodeURIComponent(query)}`
            };
            window.open(urls[engine], '_blank');
        });
        
        // 主题切换
        const themeToggle = document.getElementById('themeToggle');
        if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
            document.body.setAttribute('data-theme', 'dark');
            themeToggle.textContent = '☀️';
        }
        themeToggle.addEventListener('click', () => {
            const isDark = document.body.getAttribute('data-theme') === 'dark';
            document.body.setAttribute('data-theme', isDark ? '' : 'dark');
            themeToggle.textContent = isDark ? '🌙' : '☀️';
        });
        
        // 侧边栏平滑滚动
        document.querySelectorAll('.sidebar a').forEach(anchor => {
            anchor.addEventListener('click', (e) => {
                e.preventDefault();
                const target = document.querySelector(anchor.getAttribute('href'));
                if (target) {
                    window.scrollTo({ top: target.offsetTop - 80, behavior: 'smooth' });
                }
            });
        });
        
        // 滚动返回顶部
        window.addEventListener('scroll', () => {
            document.getElementById('scrollTop').classList.toggle('visible', window.pageYOffset > 300);
        });
        document.getElementById('scrollTop').addEventListener('click', () => {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });
        
        // 快捷键打开后台 (按3次A)
        document.addEventListener('keydown', (e) => {
            if (e.target.tagName === 'INPUT') return;
            if (e.key.toLowerCase() === 'a') {
                keyPressCount++;
                clearTimeout(keyPressTimer);
                keyPressTimer = setTimeout(() => keyPressCount = 0, 1000);
                if (keyPressCount >= 3) {
                    openAdmin();
                    keyPressCount = 0;
                }
            }
        });
    });
    </script>
</body>
</html>
